<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Виртуальный стенд - список заданий</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/tasks.css') }}">
</head>
<body>
  <div class="page-wrapper">

      <header class="header">
          <div class="logo">Virtual Stand</div>
          <div class="search-block">
              <input type="text" class="search-input" placeholder="Поиск...">
              <button class="search-btn">найти</button>
          </div>
      </header>

      <nav class="nav-tabs">
            <a href="{{ url_for('main_page') }}" class="tab">Главная</a>
            <a href="{{ url_for('tasks.course_tasks', course_id=course_id) }}" class="tab active">Задания</a>
      </nav>

      <main class="content">
          <ul class="task-list">
              {% for lab in labs %}
              <li class="task-item">
                  <span class="task-name">{{ lab.name }}</span>
                  <a href="{{ url_for('task.index', lab_id=lab.lab_id) }}" class="btn btn-edit">Редактировать</a>
              </li>
              {% endfor %}
          </ul>

          <div class="bottom-bar">
              <button onclick="document.getElementById('addTaskModal').style.display='flex'"
                      class="btn btn-add">
                  Добавить задание
              </button>
          </div>
      </main>
  </div>

  <div id="addTaskModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.45); z-index:1000; align-items:center; justify-content:center;">
    <div style="background:#fff; border-radius:12px; padding:1.5rem; width:100%; max-width:420px; margin:1rem; position:relative;">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.25rem;">
        <span style="font-size:16px; font-weight:500;">Добавить задание</span>
        <button onclick="document.getElementById('addTaskModal').style.display='none'"
                style="background:none; border:none; font-size:20px; cursor:pointer; color:#888;">✕</button>
      </div>

      <form method="POST" action="/task/add" enctype="multipart/form-data">
        <div style="display:flex; flex-direction:column; gap:12px;">

          <div>
            <label style="font-size:13px; color:#666; display:block; margin-bottom:4px;">Введите курс для добавления задания</label>
            <input type="text" name="course" placeholder="Введите название курса"
                   style="width:100%; padding:8px; border:1px solid #ccc; border-radius:6px; box-sizing:border-box;" />
          </div>

          <div>
            <label style="font-size:13px; color:#666; display:block; margin-bottom:4px;">Введите название задания</label>
            <input type="text" name="name" required
                   style="width:100%; padding:8px; border:1px solid #ccc; border-radius:6px; box-sizing:border-box;" />
          </div>

          <div>
            <label style="font-size:13px; color:#666; display:block; margin-bottom:4px;">Введите срок задания</label>
            <input type="date" name="deadline"
                   style="width:100%; padding:8px; border:1px solid #ccc; border-radius:6px; box-sizing:border-box;" />
          </div>

          <div>
            <label style="font-size:13px; color:#666; display:block; margin-bottom:4px;">Введите описание задания</label>
            <textarea name="description" rows="3"
                      style="width:100%; padding:8px; border:1px solid #ccc; border-radius:6px; resize:vertical; box-sizing:border-box;"></textarea>
          </div>

          <div>
            <label style="font-size:13px; color:#666; display:block; margin-bottom:4px;">Прикрепите файл задания (при наличии)</label>
            <div style="display:flex; align-items:center; gap:8px;">
              <label style="cursor:pointer; padding:6px 10px; border:1px solid #ccc; border-radius:6px; font-size:13px;">
                📎 <input type="file" name="file" style="display:none;"
                          onchange="this.parentElement.nextElementSibling.textContent=this.files[0]?.name||'Файл не выбран'" />
              </label>
              <span style="font-size:13px; color:#999;">Файл не выбран</span>
            </div>
          </div>

          <div style="display:flex; gap:8px; margin-top:4px;">
            <button type="submit"
                    style="flex:1; padding:8px; background:#4a6fa5; color:#fff; border:none; border-radius:6px; cursor:pointer;">
              Принять
            </button>
            <button type="button"
                    onclick="document.getElementById('addTaskModal').style.display='none'"
                    style="flex:1; padding:8px; background:#fff; border:1px solid #ccc; border-radius:6px; cursor:pointer;">
              Отменить
            </button>
          </div>

        </div>
      </form>
    </div>
  </div>

  <script> <!-- вынести в отдельный файл js (но можно и оставить она маленькая) -->
    document.getElementById('addTaskModal').addEventListener('click', function(e) {
      if (e.target === this) this.style.display = 'none';
    });

    if (window.location.search.includes('add=1')) {
      document.getElementById('addTaskModal').style.display = 'flex';
    }
  </script>
</body>
</html>
