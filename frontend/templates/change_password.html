<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Новый пароль</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/change_password.css') }}">
</head>
<body>
    <div class="change-password-container">
      <h1>Ввод нового пароля</h1>

      <form action="/newpassword" method="post" id="newpasswrdForm">
        <div class="form-row">
          <div class="form-group" id="newpassword">
            <label for="newpasswrd">Введите новый пароль</label>
            <input type="password"
                   id="newpasswrd"
                   name="newpassword"
                   class="newpassword"
                   autofocus
                   required>
          </div>
          <div class="form-group" id="password-ver">
            <label for="passwrdver">Подтвердите пароль</label>
            <input type="password"
                   id="passwrdver"
                   name="passwrdver"
                   class="password-ver"
                   required>
          </div>
        </div>
        <div id="error-message" style="color: red; display: none;">Пароли не совпадают</div>
        <div class="button-container">
          <button type="submit" class="submit-btn">Сохранить пароль</button>
        </div>
      </form>
    </div>

    <script>
        document.getElementById('newpasswrdForm').addEventListener('submit', function(e) {
            const password = document.getElementById('newpasswrd').value;
            const confirm = document.getElementById('passwrdver').value;
            const error = document.getElementById('error-message');

            if (password !== confirm) {
                e.preventDefault();
                error.style.display = 'block';
            } else {
                error.style.display = 'none';
            }
        });
    </script>
</body>
</html>
