<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Новый пароль</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/change_password.css') }}">
</head>
<body>
    <div class="change-password-container">
      <h1>Ввод нового пароля</h1>

      <form action="/newpassword" method="post" id="newpasswrdForm">
        <div class="form-row">
          <div class="form-group" id="newpassword">
            <label for="newpasswrd">Введите новый пароль</label>
            <input type="text"
                   id="newpasswrd"
                   class="newpassword"
                   autofocus
                   required>
          </div>
          <div class="form-group" id="password-ver">
            <label for="passwrdver">Подтвердите пароль</label>
            <input type="text"
                   id="passwrdver"
                   class="password-ver"
                   required>
          </div>
        </div>
        <div class="button-container">
                <button type="submit" class="submit-btn" onclick="window.location.href='{{ url_for('main_page') }}'">Сохранить пароль</button>
            </div>
      </form>
    </div>
</body>
</html>
