<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>GUI приложение</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/container_gui.css') }}">
</head>
<body>
    <div class="toolbar">
        <span>🖥 GUI приложение</span>
        <span class="program-info">📄 {{ main_file }}</span>
        <button class="btn-stop" id="stopBtn">Остановить</button>
    </div>

    <iframe src="{{ novnc_url }}" allowfullscreen></iframe>

    <script>
        const PROJECT_ID = {{ project_id }};

        document.getElementById('stopBtn').addEventListener('click', async () => {
            if (!confirm('Остановить контейнер?')) return;

            try {
                const response = await fetch(`/streamer/container/${PROJECT_ID}/stop`, {
                    method: 'POST'
                });
                const data = await response.json();

                if (data.success) {
                    alert('Контейнер остановлен');
                    window.close();
                } else {
                    alert('Ошибка: ' + data.error);
                }
            } catch (err) {
                alert('Ошибка при остановке контейнера: ' + err.message);
            }
        });
    </script>
</body>
</html>
