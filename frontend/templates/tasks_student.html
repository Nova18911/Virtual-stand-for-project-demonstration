<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Задания — студент</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/tasks.css') }}">
</head>
<body>
    <div class="page-wrapper">

        <header class="header">
            <div class="logo">Virtual Stand</div>
            <div class="search-block">
                <input type="text" class="search-input" placeholder="Поиск...">
                <button class="search-btn">найти</button>
            </div>
        </header>

        <nav class="nav-tabs">
            <a href="{{ url_for('main_page') }}" class="tab">Главная</a>
            <a href="{{ url_for('tasks.course_tasks', course_id=course_id) }}" class="tab active">Задания</a>
        </nav>

        <main class="content">
            <ul class="task-list">
                {% for lab in labs %}
                <li class="task-item">
                    <a href="{{ url_for('task.index', lab_id=lab.lab_id) }}" class="task-link">{{ lab.name }}</a>
                    {% if lab.submitted %}
                        <span class="status status-done">✔ Выполнено</span>
                    {% else %}
                        <span class="status status-not-done">Не выполнено</span>
                    {% endif %}
                </li>
                {% endfor %}
            </ul>
        </main>

    </div>
</body>
</html>
