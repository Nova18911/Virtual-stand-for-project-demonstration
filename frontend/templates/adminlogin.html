<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — Панель администратора</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/adminlogin.css') }}">
</head>
<body>

<header class="header">
    <div class="header__title">Панель администратора</div>
</header>

<div class="login-wrap">
    <div class="login-card">
        <h2 class="login-card__title">Добро пожаловать!</h2>

        {% for msg in get_flashed_messages() %}
        <div class="flash">{{ msg }}</div>
        {% endfor %}

        <form id="loginForm" method="POST">
            <div class="form-group">
                <label>Логин</label>
                <input type="email" name="email" required>
            </div>
            <div class="form-group">
                <label>Пароль</label>
                <input type="password" name="password" required>
            </div>
            <button class="btn-login" type="button"
                    onclick="document.getElementById('loginForm').submit()">Войти</button>
        </form>
    </div>
</div>

</body>
</html>
