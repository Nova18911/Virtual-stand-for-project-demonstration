<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Результат работы программы</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/container_view.css') }}">
</head>
<body>
    <div class="page-wrapper">

        <header class="header">
            <div class="logo">Virtual Stand</div>
            <span class="status-badge" id="status-badge">🟢 Подключение...</span>
        </header>

        <div class="terminal" id="terminal">
            <div class="terminal-output" id="output"></div>
        </div>

        <div class="input-block">
            <input type="text"
                   id="user-input"
                   class="terminal-input"
                   placeholder="Введите данные для программы...">
            <button class="send-btn" id="send-btn">Отправить</button>
        </div>

    </div>

    <script>
        const projectId = {{ project_id }};
        const output = document.getElementById('output');
        const statusBadge = document.getElementById('status-badge');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');

        let eventSource = null;
        let isRunning = true;

        function addLine(text, type = 'output') {
            const line = document.createElement('div');
            line.className = `output-line ${type}`;
            line.textContent = text;
            output.appendChild(line);
            output.scrollTop = output.scrollHeight;
        }

        function connectToLogs() {
            eventSource = new EventSource(`/container/${projectId}/logs`);

            eventSource.onopen = function() {
                addLine('✅ Подключено к контейнеру', 'info');
                statusBadge.textContent = '🟢 Работает';
                statusBadge.className = 'status-badge running';
            };

            eventSource.onmessage = function(event) {
                if (event.data) {
                    // Проверяем, не является ли сообщение командой запуска
                    if (event.data.includes('🚀 Запуск программы')) {
                        addLine(event.data, 'info');
                    } else {
                        addLine(event.data, 'output');
                    }
                }
            };

            eventSource.addEventListener('close', function(event) {
                addLine('🔌 Программа завершила работу', 'error');
                statusBadge.textContent = '🔴 Завершено';
                statusBadge.className = 'status-badge stopped';
                isRunning = false;
                userInput.disabled = true;
                sendBtn.disabled = true;
                eventSource.close();
            });

            eventSource.onerror = function() {
                if (isRunning) {
                    addLine('⚠️ Потеря соединения с сервером', 'error');
                    statusBadge.textContent = '🔴 Ошибка';
                    statusBadge.className = 'status-badge stopped';
                }
            };
        }

        function sendInput() {
            const value = userInput.value.trim();
            if (!value) return;

            addLine(`> ${value}`, 'input');

            fetch(`/container/${projectId}/input`, {
                method: 'POST',
                headers: {'Content-Type': 'application/x-www-form-urlencoded'},
                body: `input=${encodeURIComponent(value)}`
            }).catch(err => {
                addLine(`❌ Ошибка отправки: ${err.message}`, 'error');
            });

            userInput.value = '';
        }

        sendBtn.addEventListener('click', sendInput);
        userInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                sendInput();
            }
        });

        // Подключаемся к логам
        connectToLogs();
    </script>
</body>
</html>
