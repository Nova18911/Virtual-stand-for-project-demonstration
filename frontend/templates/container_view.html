<!-- frontend/templates/container_view.html -->
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Результат работы программы</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/container_view.css') }}">
</head>
<body>
    <!-- Главный контейнер с data-атрибутом для project_id -->
    <div id="container-view" data-project-id="{{ project_id }}">

        <div class="page-wrapper">
            <header class="header">
                <div class="logo">Virtual Stand</div>
                <div class="program-info">📄 {{ main_file }}</div>
                <span class="status-badge running" id="status-badge">🟢 Подключение...</span>
            </header>

            <div class="terminal" id="terminal">
                <div class="terminal-output" id="output"></div>
            </div>

            <div class="input-block">
                <input type="text" id="user-input" class="terminal-input"
                       placeholder="Введите данные и нажмите Enter...">
                <button class="send-btn" id="send-btn">Отправить</button>
                <button class="stop-btn" id="stop-btn">⏹️ Остановить</button>
            </div>
        </div>

    </div>

    <!-- Подключаем внешний JS-файл -->
    <script src="{{ url_for('static', filename='js/container_view.js') }}"></script>
</body>
</html>
