<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{{ lab.name }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/student_list.css') }}">
</head>
<body>
<div class="page-wrapper">

    <header class="header">
        <div class="logo">Virtual Stand</div>
    </header>

    <nav class="nav-tabs">
        <a href="/courses" class="tab">Курсы</a>
        <a href="javascript:history.back()" class="tab">Задания</a>
        <span class="tab active">{{ lab.name }}</span>
    </nav>

    <div class="main-layout">

        <aside class="sidebar">
            <h2 class="sidebar-title">Список студентов</h2>
            <div class="search-block">
                <input type="text" id="searchInput" class="search-input" placeholder="Поиск...">
                <button class="search-btn" id="searchBtn">найти</button>
            </div>
            <ul class="student-list" id="studentList"></ul>
        </aside>

        <main class="detail" id="detailPanel">
            <p class="hint" id="hintText">Выберите студента из списка</p>

            <div id="studentDetail" style="display:none;">
                <div class="field-row">
                    <label class="field-label">Ссылка</label>
                    <input type="text" id="githubLink" class="field-input"
                           placeholder="ссылка на github репозиторий" readonly>
                </div>

                <div class="field-row">
                    <div id="dockerBlock"></div>
                </div>

                <div class="field-row">
                    <label class="field-label">Готовая ссылка:</label>
                    <input type="text" id="containerLink" class="field-input"
                           placeholder="ссылка для запуска docker контейнера" readonly>
                </div>

                <div class="field-row grade-row">
                    <label class="field-label">Оценка:</label>
                    <div class="grade-form" id="gradeForm">
                        {% for grade in [2, 3, 4, 5] %}
                        <button class="grade-btn" data-grade="{{ grade }}">{{ grade }}</button>
                        {% endfor %}
                    </div>
                </div>

                <div class="field-row comment-row">
                    <label class="field-label">Оставить комментарий</label>
                    <textarea class="comment-input" id="commentInput" rows="4"></textarea>
                    <button class="btn-save" id="saveCommentBtn">Сохранить</button>
                </div>
            </div>
        </main>
    </div>
</div>

<script>
    const LAB_ID = {{ lab.lab_id }};
</script>
<script src="{{ url_for('static', filename='js/student_list.js') }}"></script>
</body>
</html>
