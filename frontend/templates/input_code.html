<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Подтверждение учетной записи</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/input_code.css') }}">
</head>
<body>
    <div class="input_code_container">
        <h2>Подтверждение учетной записи</h2>
        <label>Введите код</label>
        <form action="/inputcode" method="post" id="codeForm">
            <div class="form-row">
                <div class="form-group" id="code-inputs">
                    <input type="text" inputmode="\d*" maxlength="1" id="code1" name="input_code1" class="code-input" autofocus>
                    <input type="text" inputmode="\d*" maxlength="1" id="code2" name="input_code2" class="code-input">
                    <input type="text" inputmode="\d*" maxlength="1" id="code3" name="input_code3" class="code-input">
                    <input type="text" inputmode="\d*" maxlength="1" id="code4" name="input_code4" class="code-input">
                    <input type="text" inputmode="\d*" maxlength="1" id="code5" name="input_code5" class="code-input">
                    <input type="text" inputmode="\d*" maxlength="1" id="code6" name="input_code6" class="code-input">
                </div>
            </div>
        </form>
    </div>
    <script>        <!-- вынести в отдельный файл js -->
        document.addEventListener('DOMContentLoaded', function() {
            const inputs = document.querySelectorAll('.code-input');
            const form = document.getElementById('codeForm');

            function checkCode() {
                let code = '';
                inputs.forEach(input => code += input.value);

                if (code.length === inputs.length) {
                    // Отправляем на сервер — он проверяет код из письма
                    fetch('/inputcode', {
                        method: 'POST',
                        body: new FormData(form)
                    })
                    .then(res => res.json())
                    .then(data => {
                        if (data.success) {
                            window.location.href = data.redirect;
                        } else {
                            alert('❌ Неверный код!');
                            inputs.forEach(input => input.value = '');
                            inputs[0].focus();
                        }
                    });
                }
            }

            inputs.forEach((input, index) => {
                input.addEventListener('input', function() {
                    this.value = this.value.replace(/[^0-9]/g, '');
                    if (this.value && index < inputs.length - 1) {
                        inputs[index + 1].focus();
                    }
                    checkCode();
                });

                input.addEventListener('keydown', function(e) {
                    if (e.key === 'Backspace' && !this.value && index > 0) {
                        inputs[index - 1].focus();
                    }
                });

                input.addEventListener('focus', function() {
                    this.select();
                });
            });

            inputs[0].focus();
        });
    </script>
</body>
</html>
