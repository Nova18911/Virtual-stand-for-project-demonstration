<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Экспорт — Панель администратора</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/adminexport.css') }}">
</head>
<body>

<header class="header">
    <div class="header__title">Панель администратора</div>
    <div class="header__user">
        Вы вошли как {{ user_name }}
        <a href="{{ url_for('auth.logout') }}" class="header__logout" title="Выйти">🔒</a>
    </div>
</header>

<nav class="navbar">
    <a href="{{ url_for('admin_main.index') }}" class="navbar__link navbar__link--active">Главная</a>
    <a href="{{ url_for('adminlogin.admin_export_page') }}" class="navbar__link">Экспорт</a>
    <a href="{{ url_for('admin_import.index') }}" class="navbar__link">Импорт</a>
</nav>

<main class="main">
    <h1 class="main__title">Экспорт данных</h1>

    <div class="export-panel">

        <!-- Левая колонка: тип экспорта -->
        <div class="export-col">
            <div class="col__title">Тип экспорта</div>
            <form>
                <label class="checkbox-label">
                    <input type="checkbox" id="fullBackupCheckbox">
                    Экспортировать все данные
                </label>
            </form>
            <form>
                <label class="checkbox-label">
                    <input type="checkbox" id="customExportCheckbox">
                    Настроить экспорт
                </label>
            </form>
            <button class="btn" id="exportBtn">Экспорт</button>
        </div>

        <!-- Средняя колонка: таблицы -->
        <div class="export-col export-col--wide">
            <div class="col__title">Выберите таблицы</div>
            <div id="tables"></div>
            <div id="result"></div>
            <script src="{{ url_for('static', filename='js/tables.js') }}"></script>
        </div>

        <!-- Правая колонка: настройки -->
        <div class="export-col">
            <div class="col__title">Формат файла</div>
            <select name="select" id="fileFormat">
                <option value="value1">MySQL</option>
                <option value="value2">PostgreSQL</option>
            </select>

            <label class="checkbox-label" style="margin-bottom: 16px;">
                Сохранить в виде zip архива
                <input type="checkbox" id="zipCheckbox">
            </label>

            <div class="col__title">Название файла</div>
            <input type="text" name="namefile" id="fileName" placeholder="backup">
        </div>

    </div>
</main>

</body>
</html>
